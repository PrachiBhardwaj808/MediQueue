<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediQueue | Clinical Management System</title>
    <link rel="stylesheet" href="home.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="main-wrapper">
        <div class="content-box">
            <header>
                <h1>MEDIQUEUE</h1>
                <p>Priority-Based Patient Management System</p>
            </header>

            <section class="identity-selection">
                <p class="instruction">Please select your portal to continue</p>
                
                <div class="options-container">
                    <a href="patientSide/patient.html" class="portal-card">
                        <div class="icon-placeholder">
                            <svg viewBox="0 0 24 24" width="40" height="40" stroke="currentColor" stroke-width="2" fill="none"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                        </div>
                        <h3>Patient Portal</h3>
                        <ul>
                            <li>Token Generation</li>
                            <li>Live Queue Tracking</li>
                        </ul>
                        <span class="btn">Access Portal</span>
                    </a>

                    <a href="receptionistSide/receptionist.html" class="portal-card">
                        <div class="icon-placeholder">
                            <svg viewBox="0 0 24 24" width="40" height="40" stroke="currentColor" stroke-width="2" fill="none"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                        </div>
                        <h3>Staff Dashboard</h3>
                        <ul>
                            <li>Queue Management</li>
                            <li>Priority Sorting</li>
                        </ul>
                        <span class="btn btn-alt">Staff Login</span>
                    </a>
                </div>
            </header>
        </div>
    </div>
</body>
</html>
