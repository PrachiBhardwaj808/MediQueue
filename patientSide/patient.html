<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediQueue</title>
    <link rel="stylesheet" href="patient.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>

    <main class="container">
        <section class="card">

            <!-- 🔹 Logo + Branding -->
            <div class="logo-box">
                <img src="logo.png" alt="logo">
            </div>

            <h1 class="app-name">Patient Registration</h1>
            <p class="tagline">Priority-based patient check-in system</p>

            <!-- 🔹 Form -->
            <form id="registrationForm">

                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" required placeholder="Enter patient name">
                </div>

                <div class="form-group">
                    <label for="age">Age</label>
                    <input type="number" id="age" name="age" required min="0" placeholder="Enter age">
                </div>

                <div class="form-group">
                    <label for="symptoms">Symptoms</label>
                    <textarea id="symptoms" name="symptoms" required rows="3"
                        placeholder="e.g. fever, chest pain, cough, breathing issue..."></textarea>
                </div>

                <button type="submit" class="submit-btn">Generate Token</button>

            </form>

        </section>
    </main>

    <script src="patient.js"></script>
</body>

</html>
